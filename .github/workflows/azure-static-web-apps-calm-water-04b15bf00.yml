name: Azure Static Web Apps CI/CD (Calm Water)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Calm Water

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ✅ 修正：github-script を使う場合、script 部分は "純粋な JS" で記述
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          result-encoding: string
          script: |
            // 以下はJSとして有効なコードです
            return await core.getIDToken();

      # 👇 デプロイ設定は変更なし
      - name: Deploy to Azure Static Web Apps (Calm Water)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_WATER_04B15BF00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          github_id_token: ${{ steps.idtoken.outputs.result }}

          # ビルド不要の静的サイト向け設定
          skip_app_build: true
          app_location: "/"
          output_location: ""
